<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BEAT RUSH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0015;overflow:hidden;font-family:Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;position:absolute;top:0;left:0;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#progress-bar{position:absolute;top:0;left:0;height:4px;width:0%;background:linear-gradient(90deg,#ff6ec7,#a78bfa,#7dd3fc);}
#beat-dot{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:#ff6ec7;opacity:0;}
#song-info{position:absolute;top:18px;left:24px;}
#song-title{font-size:18px;font-weight:700;color:#fff;text-shadow:0 0 10px #a78bfa;}
#song-sub{font-size:12px;color:#a78bfa;margin-top:2px;}
#score-box{position:absolute;top:18px;right:24px;text-align:right;}
#score{font-size:34px;font-weight:900;color:#fff;text-shadow:0 0 20px #ff6ec7;letter-spacing:2px;}
#combo{font-size:17px;color:#ffdd00;margin-top:3px;}
#acc{font-size:13px;color:#aaa;margin-top:1px;}
#feedback{position:absolute;bottom:155px;left:50%;transform:translateX(-50%);font-size:26px;font-weight:900;opacity:0;pointer-events:none;white-space:nowrap;}
#taps{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);display:flex;pointer-events:all;z-index:10;}
.tbtn{width:130px;height:50px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1);cursor:pointer;}
.tbtn:first-child{border-radius:12px 0 0 12px;background:rgba(255,100,150,0.07);}
.tbtn:last-child{border-radius:0 12px 12px 0;background:rgba(100,180,255,0.07);}
.tbtn.on{background:rgba(255,255,255,0.18)!important;color:#fff;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,0,21,0.96);z-index:20;overflow-y:auto;padding:20px;}
.screen.active{display:flex;}
#ss h1{font-size:48px;font-weight:900;color:#fff;text-shadow:0 0 30px #ff6ec7,0 0 60px #a78bfa;letter-spacing:5px;margin-bottom:6px;}
#ss .sub{font-size:14px;color:#a78bfa;margin-bottom:22px;letter-spacing:2px;}
#song-list{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;max-width:740px;}
.scard{width:155px;padding:14px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:14px;cursor:pointer;text-align:center;transition:all 0.18s;}
.scard.sel{border-color:#ff6ec7;background:rgba(255,110,199,0.14);transform:scale(1.04);}
.scard .ico{font-size:28px;margin-bottom:5px;}
.scard .nm{font-size:12px;font-weight:700;color:#fff;margin-bottom:2px;}
.scard .bpm{font-size:10px;color:#a78bfa;}
.scard .src{font-size:10px;color:#7dd3fc;margin-top:2px;}
#diff-bar{display:flex;margin-bottom:18px;}
.dbtn{padding:9px 26px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.15);cursor:pointer;background:transparent;}
.dbtn:first-child{border-radius:10px 0 0 10px;}
.dbtn:last-child{border-radius:0 10px 10px 0;}
.dbtn.sel{background:linear-gradient(135deg,#ff6ec7,#a78bfa);color:#fff;border-color:transparent;}
#play-btn{padding:13px 56px;font-size:21px;font-weight:700;background:linear-gradient(135deg,#ff6ec7,#a78bfa);color:#fff;border:none;border-radius:50px;cursor:pointer;margin-bottom:12px;}
#ss-hint{font-size:11px;color:#444;text-align:center;line-height:1.9;margin-bottom:10px;}
#lb-open{padding:7px 22px;font-size:13px;background:transparent;color:#a78bfa;border:1px solid #a78bfa;border-radius:20px;cursor:pointer;}
#lb h2{font-size:30px;font-weight:900;color:#ffdd00;margin-bottom:18px;}
#lb-rows{width:100%;max-width:480px;margin-bottom:22px;}
.lbr{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:14px;color:#fff;}
.lbr.hd{color:#a78bfa;font-size:12px;border-bottom:1px solid rgba(167,139,250,0.3);}
.lbr .rk{color:#ffdd00;font-weight:700;width:28px;}
.lbr .sc{color:#ff6ec7;font-weight:700;}
#lb-back{padding:9px 32px;font-size:15px;background:transparent;color:#a78bfa;border:1px solid #a78bfa;border-radius:20px;cursor:pointer;}
#res h2{font-size:34px;font-weight:900;color:#ffdd00;margin-bottom:14px;}
.rrow{font-size:16px;color:#fff;margin:4px 0;}
.rrow span{color:#ff6ec7;font-weight:700;}
#r-rank{font-size:58px;margin:8px 0;}
#res-btns{display:flex;gap:14px;margin-top:18px;}
#res-btns button{padding:11px 32px;font-size:17px;font-weight:700;color:#fff;border:none;border-radius:50px;cursor:pointer;}
#res-btns button:first-child{background:linear-gradient(135deg,#ff6ec7,#a78bfa);}
#res-btns button:last-child{background:linear-gradient(135deg,#a78bfa,#7dd3fc);}
#loading{position:absolute;inset:0;background:#0a0015;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;}
#loading h2{color:#fff;font-size:24px;margin-bottom:20px;letter-spacing:4px;}
#load-wrap{width:260px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
#load-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff6ec7,#a78bfa);border-radius:3px;transition:width 0.3s;}
#load-txt{color:#a78bfa;font-size:12px;margin-top:10px;}
</style>
</head>
<body>
<div id="loading">
  <h2>✦ BEAT RUSH ✦</h2>
  <div id="load-wrap"><div id="load-bar"></div></div>
  <div id="load-txt">載入中...</div>
</div>
<canvas id="c"></canvas>
<div id="ui">
  <div id="progress-bar"></div><div id="beat-dot"></div>
  <div id="song-info"><div id="song-title"></div><div id="song-sub"></div></div>
  <div id="score-box"><div id="score">000000</div><div id="combo">COMBO x 0</div><div id="acc">Accuracy: 100%</div></div>
  <div id="feedback"></div>
  <div id="taps">
    <div class="tbtn" id="tL" ontouchstart="G.tap(0,1,event)" ontouchend="G.tap(0,0,event)" onmousedown="G.tap(0,1,event)" onmouseup="G.tap(0,0,event)">◀ TAP</div>
    <div class="tbtn" id="tR" ontouchstart="G.tap(1,1,event)" ontouchend="G.tap(1,0,event)" onmousedown="G.tap(1,1,event)" onmouseup="G.tap(1,0,event)">TAP ▶</div>
  </div>
</div>
<div class="screen active" id="ss">
  <h1>BEAT RUSH</h1><div class="sub">選擇歌曲</div>
  <div id="song-list"></div>
  <div id="diff-bar">
    <div class="dbtn" data-d="easy" onclick="G.setDiff(this)">EASY</div>
    <div class="dbtn sel" data-d="hard" onclick="G.setDiff(this)">HARD</div>
    <div class="dbtn" data-d="master" onclick="G.setDiff(this)">MASTER</div>
  </div>
  <button id="play-btn" onclick="G.start()">▶ 開始遊玩</button>
  <div id="ss-hint">左半部 ◀ 粉紅音符 · 右半部 ▶ 藍色音符 · 鍵盤 A / D</div>
  <button id="lb-open" onclick="G.showLB()">🏆 排行榜</button>
</div>
<div class="screen" id="lb">
  <h2>🏆 最高分排行榜</h2><div id="lb-rows"></div>
  <button id="lb-back" onclick="G.hideLB()">← 返回</button>
</div>
<div class="screen" id="res">
  <h2>✦ STAGE CLEAR ✦</h2>
  <div class="rrow">歌曲：<span id="r-song"></span></div>
  <div class="rrow">難度：<span id="r-diff"></span></div>
  <div class="rrow">分數：<span id="r-score"></span></div>
  <div class="rrow">最高連擊：<span id="r-combo"></span></div>
  <div class="rrow">PERFECT <span id="r-p"></span> · GOOD <span id="r-g"></span> · MISS <span id="r-m"></span></div>
  <div class="rrow">準確率：<span id="r-acc"></span></div>
  <div id="r-rank"></div>
  <div id="res-btns">
    <button onclick="G.retry()">↺ 再玩一次</button>
    <button onclick="G.toSelect()">♪ 選歌</button>
  </div>
</div>

<!-- Sprite files (add new sprites here) -->
<script src="run.js"></script>
<script src="jump.js"></script>
<script src="hit.js"></script>

<!-- Song files (add new songs here) -->
<script src="sea.js"></script>
<script src="porch.js"></script>
<script src="neon.js"></script>
<script src="cyber.js"></script>

<!-- Main game engine -->
<script src="game.js"></script>
</body>
</html>
