<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0a0015">
<title>BEAT RUSH</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="progress-bar"></div>
  <div id="beat-indicator"></div>
  <div id="song-info">
    <div id="song-title"></div>
    <div id="song-sub"></div>
  </div>
  <div id="score-display">
    <div id="score">000000</div>
    <div id="combo">COMBO × 0</div>
    <div id="accuracy">Accuracy: 100%</div>
  </div>
  <div id="hit-feedback">PERFECT!</div>
  <div id="lane-hints">
    <div class="lane-btn" id="laneL"
      ontouchstart="game.tap(0,true,event)" ontouchend="game.tap(0,false,event)"
      onmousedown="game.tap(0,true,event)" onmouseup="game.tap(0,false,event)">◀ TAP</div>
    <div class="lane-btn" id="laneR"
      ontouchstart="game.tap(1,true,event)" ontouchend="game.tap(1,false,event)"
      onmousedown="game.tap(1,true,event)" onmouseup="game.tap(1,false,event)">TAP ▶</div>
  </div>
</div>

<!-- Song Select Screen -->
<div id="song-select-screen">
  <div id="ss-title">BEAT RUSH</div>
  <div id="ss-subtitle">選擇歌曲</div>
  <div id="song-list"></div>
  <div id="difficulty-bar">
    <div class="diff-btn active" data-diff="easy" onclick="game.setDiff('easy')">EASY</div>
    <div class="diff-btn" data-diff="hard" onclick="game.setDiff('hard')">HARD</div>
    <div class="diff-btn" data-diff="master" onclick="game.setDiff('master')">MASTER</div>
  </div>
  <button id="play-btn" onclick="game.start()">▶ 開始遊玩</button>
  <div id="ss-hint">點擊左半部 ◀ 粉紅音符　點擊右半部 ▶ 藍色音符　鍵盤：A / D</div>
  <div id="leaderboard-btn-wrap"><button onclick="game.showLeaderboard()">🏆 排行榜</button></div>
</div>

<!-- Leaderboard Screen -->
<div id="leaderboard-screen">
  <h2>🏆 最高分排行榜</h2>
  <div id="lb-list"></div>
  <button onclick="game.hideLeaderboard()">← 返回</button>
</div>

<!-- Result Screen -->
<div id="result-screen">
  <h2 id="r-title">✦ STAGE CLEAR ✦</h2>
  <div class="result-row">歌曲：<span id="r-song"></span></div>
  <div class="result-row">難度：<span id="r-diff"></span></div>
  <div class="result-row">最終分數：<span id="r-score">0</span></div>
  <div class="result-row">最高連擊：<span id="r-combo">0</span></div>
  <div class="result-row">PERFECT <span id="r-perfect">0</span> · GOOD <span id="r-good">0</span> · MISS <span id="r-miss">0</span></div>
  <div class="result-row">準確率：<span id="r-acc">0%</span></div>
  <div id="r-rank"></div>
  <div id="result-btns">
    <button onclick="game.retry()">↺ 再玩一次</button>
    <button onclick="game.backToSelect()">♪ 選歌</button>
  </div>
</div>

<script src="audio.js"></script>
<script src="songs.js"></script>
<script src="notes.js"></script>
<script src="renderer.js"></script>
<script src="game.js"></script>
</body>
</html>
